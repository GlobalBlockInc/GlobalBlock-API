---
name: AI Debugging Assistant

on: [push, pull_request]

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run AI Debugging
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: true
