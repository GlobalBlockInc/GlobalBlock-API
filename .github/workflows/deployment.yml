name: AI Deployment Optimizer

on: [push]

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install ko
  run: |
    curl -L https://github.com/ko-build/ko/releases/latest/download/ko-linux-amd64 -o /usr/local/bin/ko
    chmod +x /usr/local/bin/ko
